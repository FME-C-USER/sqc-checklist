    // ============================================================
    // 共用：照片壓縮工具（上傳壓縮 + 縮圖預覽）
    //   目標 800KB~1200KB / 長邊1920px / 品質0.92起 每次-0.1 至<1200KB / 下限0.3 / JPEG
    //   縮圖：固定品質 0.7，僅供畫面顯示
    // ============================================================
    const MAX_EDGE = 1920, MAX_KB = 1200, MIN_Q = 0.3, START_Q = 0.92, THUMB_Q = 0.7;

    function loadImage(file) {
      return new Promise((res, rej) => {
        const img = new Image();
        img.onload = () => res(img);
        img.onerror = rej;
        img.src = URL.createObjectURL(file);
      });
    }
    function drawScaled(img) {
      let { width: w, height: h } = img;
      if (Math.max(w, h) > MAX_EDGE) {
        const r = MAX_EDGE / Math.max(w, h);
        w = Math.round(w * r); h = Math.round(h * r);
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      return c;
    }
    function canvasToBlob(canvas, q) {
      return new Promise(res => canvas.toBlob(b => res(b), 'image/jpeg', q));
    }
    async function compressImage(file) {
      const img = await loadImage(file);
      const canvas = drawScaled(img);
      let q = START_Q;
      let blob = await canvasToBlob(canvas, q);
      while (blob.size / 1024 > MAX_KB && q > MIN_Q) {
        q = Math.round((q - 0.1) * 100) / 100;
        blob = await canvasToBlob(canvas, q);
      }
      const thumb = canvas.toDataURL('image/jpeg', THUMB_Q);
      return { name: file.name.replace(/\.[^.]+$/, '') + '.jpg', sizeKB: Math.round(blob.size / 1024), quality: q, thumb, blob };
    }

    function PhotoUpload({ label, photos, onChange, required, max = 10, folderPath }) {
      const [busy, setBusy] = useState(false);
      const list = photos || [];
      const handleFile = async (e) => {
        const files = Array.from(e.target.files);
        e.target.value = '';
        setBusy(true);
        const out = [];
        for (const f of files) {
          if (list.length + out.length >= max) break;
          try { out.push(await compressImage(f)); } catch (_) {}
        }
        onChange([...list, ...out]);
        setBusy(false);
      };
      const remove = (i) => onChange(list.filter((_, idx) => idx !== i));
      const need = required && list.length === 0;
      return (
        <div className={"mt-2 rounded-lg border p-2 " + (need ? "border-red-300 bg-red-50" : "border-slate-200 bg-slate-50")}>
          <div className="flex items-center justify-between gap-2">
            <span className="text-xs font-medium text-slate-600">
              {label}{required && <span className="text-red-500"> *必須</span>}
              <span className="text-slate-400">（{list.length}/{max}）</span>
            </span>
            <label className="text-xs px-2 py-1 bg-emerald-600 text-white rounded cursor-pointer hover:bg-emerald-700 whitespace-nowrap">
              {busy ? '壓縮中…' : '+ 拍照/上傳'}
              <input type="file" accept="image/*" capture="environment" multiple className="hidden" onChange={handleFile} disabled={busy} />
            </label>
          </div>
          {folderPath && <div className="text-[10px] text-slate-400 mt-1">📁 {folderPath}</div>}
          {list.length > 0 && (
            <div className="flex flex-wrap gap-2 mt-2">
              {list.map((p, i) => (
                <div key={i} className="relative">
                  <img src={p.thumb} className="w-16 h-16 object-cover rounded border" />
                  <span className="absolute bottom-0 inset-x-0 bg-black/50 text-white text-[9px] text-center">{p.sizeKB}KB</span>
                  <button onClick={() => remove(i)} className="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 text-white rounded-full text-xs leading-none">×</button>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

          { id: 'B15', name: '15.落地陳列', max: 5, type: 'deduct', desc: '上層陳列量≥一半且拉排面、POP完整；落地無異常堆疊、不遮門面/貨架、割箱一致' },
        ]},
        { key: 'C', name: '客用空間', max: 10, items: [
          { id: 'C16', name: '16.休憩區', max: 7, type: 'deduct', desc: '休憩區桌椅及空間乾淨無髒污、桌貼無殘膠破損翹起；無阻擋座位區動線或佔用休憩區空間' },
          { id: 'C17', name: '17.垃圾桶', max: 3, type: 'deduct', desc: '投入口無髒污膠痕垃圾滿溢；指示標籤清楚無破損外翻脫落' },
        ]},
      ],
      // 觀察區：重點觀察題(拍照) + 廁所(有無) + 文字
      keyObservations: [
        { id: 'KO1', name: '重點觀察題1.【店外全景照】' },
        { id: 'KO2', name: '重點觀察題2.【櫃台全景照】' },
        { id: 'KO3', name: '重點觀察題3.【FF區全景照】' },
      ],
      toiletObservations: [
        { id: 'O1', name: '店舖有無對外廁所', opts: ['有', '無', '廁所封閉'], show: 'always' },
        { id: 'O2', name: '店舖有無開放對外廁所', opts: ['有', '無'], show: 'has' },
        { id: 'O3', name: '店外招牌有無廁所標示', opts: ['有', '無'], show: 'hasOrClosed' },
        { id: 'O4', name: '店內有無廁所標示', opts: ['有', '無'], show: 'hasOrClosed' },
        { id: 'O5', name: '是否提供備品（衛生紙、洗手乳、芳香劑）', opts: ['有', '無'], show: 'has' },
      ],
      // 廁所觀察題（對外廁所觀察記錄最下方，僅「有」時填）
      toiletInspect: [
        { id: 'T1', name: '廁所乾淨無髒污及垃圾桶無明顯滿溢' },
        { id: 'T2', name: '落實填寫廁間清潔表；無堆放雜物（ex.紙箱、物流籃、資源回收物…等）' },
      ],
    };
    const IDENTITIES = ['店長', '副店', '正職', 'PT'];
    const PASS_SCORE = 85;

    // 是否已設定後端（未設定＝DEMO 模式，用內建 mock 可離線展示）
    const CONFIGURED = !!(window.SQC_CONFIG && window.SQC_CONFIG.GAS_URL && window.SQC_CONFIG.GAS_URL.indexOf('XXXXXXXX') < 0);
    const MONTH = (window.SQC_CONFIG && window.SQC_CONFIG.MONTH) || '11506';

    // 民國年月 11506 → 「115年06月」
    function monthFolderOf(m) { return m.slice(0, 3) + '年' + m.slice(3, 5) + '月'; }
    // 台北時間現在（datetime-local 預設值用）
    function taipeiNow() { return new Date(Date.now() + 8 * 3600 * 1000).toISOString().slice(0, 16); }
    // 點檢時間(YYYY-MM-DDTHH:mm) → 民國年月，如 2026-07 → 11507
    function rocMonth(dt) { if (!dt || dt.length < 7) return MONTH; return String(parseInt(dt.slice(0, 4)) - 1911) + dt.slice(5, 7); }

    // 將後端扁平題目陣列組成 categories 結構（附上固定的觀察題定義）
    function buildChecklist(items, month, obs) {
      const order = [];
      const map = {};
      items.forEach(function (it) {
        if (!map[it.cat]) { map[it.cat] = { key: it.cat, name: it.cat, max: 0, items: [] }; order.push(it.cat); }
        map[it.cat].items.push(it);
        map[it.cat].max += Number(it.max) || 0;
      });
      const O = obs || {};
      const pick = (arr, fb) => (arr && arr.length) ? arr : fb;
      return {
        version: month,
        categories: order.map(function (k) { return map[k]; }),
        keyObservations: pick(O.keyObservations, DEMO_CHECKLIST.keyObservations),
        toiletObservations: pick(O.toiletObservations, DEMO_CHECKLIST.toiletObservations),
        toiletInspect: pick(O.toiletInspect, DEMO_CHECKLIST.toiletInspect),
      };
    }

    // 滿分照片區（無缺失時拍指定區域，每區≤10張）
    const PERFECT_ZONES = ['1.店外全景', '2.櫃台區', '3.貨架區', '4.OC&鮮食區', '5.WI五門', '6.休息區', '7.FF區', '8.落地區'];

    function gradeOf(t) {
      return t >= 95 ? { txt: '優良', c: 'text-emerald-600', bg: 'bg-emerald-100 text-emerald-700' }
        : t >= PASS_SCORE ? { txt: '合格', c: 'text-blue-600', bg: 'bg-blue-100 text-blue-700' }
        : { txt: '不合格', c: 'text-red-600', bg: 'bg-red-100 text-red-700' };
    }

    // ============================================================
    // 點檢項目列
    // ============================================================
    function ItemRow({ item, state, setState, canPhoto, monthFolder }) {
      const s = state || {};
      const labelOf = (sub) => typeof sub === 'string' ? sub : sub.label;
      const isCustom = (sub) => typeof sub === 'object' && sub.custom;
      const fixedUnits = (sub) => (typeof sub === 'object' && sub.units) ? sub.units : 1;
      const nameUnits = (lbl) => (s.customNames?.[lbl] || '').split(/[\/、,，\s]+/).filter(Boolean).length;

      // 缺失單位數：固定子項用其 units；可填子項用填入的名稱數（至少1）
      const totalUnits = (s.ngSubs || []).reduce((sum, lbl) => {
        const sub = (item.subs || []).find(x => labelOf(x) === lbl);
        if (!sub) return sum;
        return sum + (isCustom(sub) ? Math.max(1, nameUnits(lbl)) : fixedUnits(sub));
      }, 0);

      const subdeductScore = item.type === 'subdeduct' ? Math.max(0, item.max - totalUnits * item.perPoint) : null;
      const score = item.type === 'subdeduct' ? subdeductScore : (s.score != null ? s.score : item.max);
      const isNG = score < item.max;

      useEffect(() => { if (item.type === 'subdeduct') setState({ ...s, score: subdeductScore }); }, [subdeductScore]);

      const toggleSub = (lbl) => {
        const ng = s.ngSubs || [];
        setState({ ...s, ngSubs: ng.includes(lbl) ? ng.filter(x => x !== lbl) : [...ng, lbl] });
      };
      const setCustomName = (lbl, v) => setState({ ...s, customNames: { ...(s.customNames || {}), [lbl]: v } });

      return (
        <div className="px-4 py-3 border-b border-slate-100 last:border-0">
          <div className="flex items-start justify-between gap-3">
            <div className="flex-1">
              <div className="font-semibold text-slate-800 text-sm">{item.name}
                <span className="ml-2 text-xs text-slate-400">配分 {item.max}</span>
                <span className={"ml-1 text-[10px] px-1.5 py-0.5 rounded " + (item.type === 'subdeduct' ? "bg-blue-100 text-blue-600" : "bg-amber-100 text-amber-600")}>{item.type === 'subdeduct' ? '分區扣分' : '扣分題'}</span>
              </div>
              <div className="text-xs text-slate-500 mt-0.5 leading-relaxed">{item.desc}</div>
            </div>
            <div className="text-right shrink-0">
              <div className={"text-lg font-bold " + (isNG ? "text-red-500" : "text-emerald-600")}>{score}</div>
              <div className="text-[10px] text-slate-400">得分</div>
            </div>
          </div>

          {item.type === 'subdeduct' && (
            <div className="mt-2">
              <div className="text-[11px] text-slate-400 mb-1">點選「有缺失」的項目（每項 -{item.perPoint} 分，由滿分往下扣）</div>
              <div className="flex flex-wrap gap-1.5">
                {item.subs.map(sub => {
                  const lbl = labelOf(sub);
                  const on = (s.ngSubs || []).includes(lbl);
                  const u = isCustom(sub) ? Math.max(1, nameUnits(lbl)) : fixedUnits(sub);
                  return <button key={lbl} onClick={() => toggleSub(lbl)} title={sub.note || ''} className={"text-xs px-2 py-1 rounded-full border transition " + (on ? "bg-red-500 text-white border-red-500" : "bg-white text-slate-500 border-slate-300")}>{on ? '✕ ' : ''}{lbl}{sub.note ? ' ⓘ' : ''} -{u * item.perPoint}</button>;
                })}
              </div>
              {/* 可填寫子項：填入名稱（多個以、或/分隔），每個名稱扣一個缺失 */}
              {item.subs.filter(sub => isCustom(sub) && (s.ngSubs || []).includes(labelOf(sub))).map(sub => {
                const lbl = labelOf(sub);
                return (
                  <div key={lbl} className="mt-2">
                    <input value={s.customNames?.[lbl] || ''} onChange={e => setCustomName(lbl, e.target.value)}
                      placeholder={`填入${lbl}名稱，多個以「、」分隔（如：日用品架、寵物貨架）`}
                      className="w-full text-xs px-2 py-1.5 border border-red-300 rounded bg-red-50" />
                    <div className="text-[10px] text-red-500 mt-0.5">已填 {nameUnits(lbl)} 項 → 扣 {Math.max(1, nameUnits(lbl)) * item.perPoint} 分</div>
                  </div>
                );
              })}
            </div>
          )}

          {item.type === 'deduct' && (
            <div className="flex items-center gap-2 mt-2">
              <button onClick={() => setState({ ...s, score: item.max })} className={"text-xs px-4 py-1 rounded border " + (score === item.max ? "bg-emerald-500 text-white border-emerald-500" : "bg-white text-slate-500 border-slate-300")}>合格 ({item.max})</button>
              <button onClick={() => setState({ ...s, score: 0 })} className={"text-xs px-4 py-1 rounded border " + (score === 0 ? "bg-red-500 text-white border-red-500" : "bg-white text-slate-500 border-slate-300")}>缺失 (0)</button>
            </div>
          )}

          {isNG && canPhoto && (
            <PhotoUpload label="缺失照片（NG 項目必須拍照記錄）" required photos={s.photos} onChange={p => setState({ ...s, photos: p })} folderPath={`${DRIVE_ROOT}/${monthFolder}/${item.name}/缺失`} />
          )}
        </div>
      );
    }

    // ============================================================
    // 主應用
    // ============================================================
    function App() {
      const currentUser = (() => { try { return JSON.parse(sessionStorage.getItem('sqc_user')) || {}; } catch (e) { return { name: sessionStorage.getItem('sqc_user') || 'demo' }; } })();
      const user = currentUser.name || 'demo';
      const isManager = currentUser.role === '管理者';
      const [tab, setTab] = useState('basic');

      // ---- 基本資料 ----（時間用台北；月份由點檢時間決定；登入預帶自己的部/課/姓名）
      const [basic, setBasic] = useState({ time: taipeiNow(), dept: currentUser.dept || '', section: currentUser.section || '', staffId: currentUser.empId || '', storeCode: '', customStore: '', customInfo: null, storeType: '', noPhotoReason: '', noPhotoOther: '' });
      const workMonth = rocMonth(basic.time); // 依點檢時間對應的民國年月

      // ---- 開場資料（依 workMonth 載入；DEMO 用內建 mock）----
      const [boot, setBoot] = useState({ checklist: DEMO_CHECKLIST, stores: DEMO_STORES, staffs: DEMO_STAFFS, depts: DEMO_DEPTS });
      const [custResults, setCustResults] = useState([]);
      const [loading, setLoading] = useState(CONFIGURED);
      const [bootErr, setBootErr] = useState('');
      const reloadBoot = (m) => { const mo = m || workMonth; return SqcApi.getBootstrap(mo, '').then(b => {
        setBoot({
          checklist: buildChecklist(b.checklist || [], mo, b.observations),
          stores: b.stores || [],
          staffs: (b.staffs || []).map(s => ({ id: s.empId, name: s.name, dept: s.dept, section: s.section })),
          depts: b.depts || [],
        });
        setBootErr('');
      }); };
      useEffect(() => {
        if (!CONFIGURED) return;
        setLoading(true);
        reloadBoot(workMonth).catch(e => setBootErr(e.message || '載入失敗')).finally(() => setLoading(false));
      }, [workMonth]);
      const checklist = boot.checklist, STORE_ROSTER = boot.stores, STAFFS = boot.staffs, DEPTS = boot.depts;
      const TOTAL_MAX = useMemo(() => checklist.categories.reduce((s, c) => s + c.max, 0), [checklist]);
      const monthFolder = monthFolderOf(workMonth);

      const sectionStores = STORE_ROSTER.filter(s => !basic.section || s.section === basic.section);
      const store = STORE_ROSTER.find(s => s.code === basic.storeCode);
      const effStore = store || basic.customInfo; // 名單選的 或 自行新增(比對主檔後)的店
      // 可否拍照必須由點檢人員手選；不可拍照需再選原因
      const canPhoto = basic.storeType === 'photo';
      const noPhotoReasonText = basic.storeType === 'nophoto'
        ? (basic.noPhotoReason === '其他' ? ('其他：' + (basic.noPhotoOther || '').trim()) : basic.noPhotoReason)
        : '';
      const reasonOk = basic.storeType !== 'nophoto' || (basic.noPhotoReason && (basic.noPhotoReason !== '其他' || (basic.noPhotoOther || '').trim()));
      const readyToWork = !!effStore && !!basic.storeType && reasonOk;

      // ---- 點檢作業 ----
      const [scores, setScores] = useState({});
      const [keyObs, setKeyObs] = useState({});
      const [toilet, setToilet] = useState({});
      const [obsText, setObsText] = useState('');
      const [perfectPhotos, setPerfectPhotos] = useState({});
      const [paperForm, setPaperForm] = useState([]);        // 紙本點檢表（所有店必上傳）
      const [sign, setSign] = useState({ count: '', identity: '' }); // 在店店員人數 / 簽名人員身分別
      const DEMO_RECORDS = [
        { id: 1, date: '2026-06-25', store: '台北車站門市', section: '北一課', staff: '王小明', version: '115.6', total: 96, grade: '優良' },
        { id: 2, date: '2026-06-24', store: '內湖科技門市', section: '北二課', staff: '李大華', version: '115.6', total: 88, grade: '合格' },
        { id: 3, date: '2026-06-23', store: '板橋大遠百門市', section: '中區課', staff: '陳美玲', version: '115.6', total: 72, grade: '不合格' },
      ];
      const [records, setRecords] = useState(CONFIGURED ? [] : DEMO_RECORDS);
      // 正式模式：查詢紀錄/彙總 進場或改條件時，向後端查當月資料（只跑當月活頁）
      const loadRecords = () => {
        if (!CONFIGURED) return;
        const f = { from: filter.from, to: filter.to, section: filter.section, empId: isManager ? undefined : currentUser.empId };
        SqcApi.queryRecords(workMonth, f).then(r => {
          setRecords((r.records || []).map(x => ({
            id: x.id, date: String(x.time).slice(0, 10), store: x.storeName, section: x.section,
            staff: x.staffName, version: x.month, total: Number(x.total), grade: x.grade, _raw: x,
          })));
        }).catch(e => alert('查詢失敗：' + e.message));
      };

      const total = useMemo(() => {
        let t = 0;
        checklist.categories.forEach(c => c.items.forEach(it => { const s = scores[it.id]; t += (s && s.score != null) ? s.score : it.max; }));
        return t;
      }, [scores]);

      // 是否「無缺失」→ 所有題目皆滿分（沒有任何扣分）
      const noDeductDefect = useMemo(() => checklist.categories.every(c => c.items.every(it => { const s = scores[it.id]; return !s || s.score == null || s.score === it.max; })), [scores]);

      const grade = gradeOf(total);
      const setItemState = (id, st) => setScores(prev => ({ ...prev, [id]: st }));
      const logout = () => { sessionStorage.removeItem('sqc_user'); location.href = 'index.html'; };

      // 自行新增店鋪：查店鋪主檔
      const doLookup = async () => {
        const q = (basic.customStore || '').trim();
        if (!q) { setCustResults([]); return; }
        if (!CONFIGURED) {
          setCustResults(DEMO_STORES.filter(s => s.code === q || s.name.indexOf(q) >= 0).map(s => ({ code: s.code, name: s.name, section: s.section })));
          return;
        }
        try {
          const r = await SqcApi.lookupStore(q);
          const rows = r.rows || [];
          const exact = rows.filter(s => String(s.code) === q || s.name === q);
          if (exact.length === 1) { setBasic({ ...basic, customInfo: exact[0], customStore: exact[0].code + ' ' + exact[0].name }); setCustResults([]); }
          else { setCustResults(rows); if (!rows.length) alert('店鋪主檔查無此店，無法新增（請確認店號/店名）'); }
        } catch (e) { alert('查詢失敗：' + e.message); }
      };

      const resetWork = () => { setScores({}); setKeyObs({}); setToilet({}); setObsText(''); setPerfectPhotos({}); setPaperForm([]); setSign({ count: '', identity: '' }); };

      const submit = () => {
        if (!effStore) { alert('請先在「基本資料」選擇店鋪'); setTab('basic'); return; }
        if (!basic.storeType) { alert('請先在「基本資料」選擇可否拍照'); setTab('basic'); return; }
        if (!reasonOk) { alert('不可拍照店鋪請選擇原因'); setTab('basic'); return; }
        if (!basic.staffId) { alert('請先在「基本資料」選擇點檢人員'); setTab('basic'); return; }
        if (!sign.count) { alert('請選擇「在店店員人數」'); return; }
        if (!sign.identity) { alert('請選擇「簽名店鋪人員身分別」'); return; }
        // 紙本點檢表：所有店皆必須上傳
        if (!paperForm.length) { alert('所有店皆須上傳「紙本點檢表」才能送出'); return; }

        // 照片相關僅可拍照店鋪檢查；不可拍照店鋪只需紙本
        if (canPhoto) {
          for (const k of checklist.keyObservations) {
            if (!(keyObs[k.id] || []).length) { alert(`「${k.name}」為必拍重點觀察題`); return; }
          }
          if (noDeductDefect) {
            for (const z of PERFECT_ZONES) { if (!(perfectPhotos[z] || []).length) { alert(`無缺失店鋪：滿分照片區「${z}」必須上傳照片`); return; } }
          } else {
            for (const c of checklist.categories) for (const it of c.items) {
              const s = scores[it.id]; const sc = (s && s.score != null) ? s.score : it.max; const ng = sc < it.max;
              if (ng && (!s?.photos || !s.photos.length)) { alert(`「${it.name}」有扣分，請補上缺失照片`); return; }
            }
          }
        }
        const staff = STAFFS.find(s => s.id === basic.staffId);
        const storeName = effStore ? effStore.name : '';
        const storeCode = effStore ? effStore.code : '';
        const recId = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : 'r' + Date.now();

        // 明細 / 觀察 JSON
        const detail = {};
        checklist.categories.forEach(c => c.items.forEach(it => {
          const s = scores[it.id] || {};
          detail[it.id] = { name: it.name, score: (s.score != null ? s.score : it.max), ngSubs: s.ngSubs || [], customNames: s.customNames || {} };
        }));
        const observation = { toilet, obsText };

        // 蒐集照片 → 依 pathParts 排入背景上傳；照片JSON 記錄「資料夾/檔名」
        const queue = [], photosJson = {};
        const addPhotos = (pathParts, arr) => {
          if (!arr || !arr.length) return;
          const key = pathParts.join('/');
          photosJson[key] = photosJson[key] || [];
          arr.forEach((p, i) => {
            const name = `${storeCode || 'S'}_${basic.time.slice(0, 10)}_${key.replace(/[\/\s]/g, '')}_${i + 1}.jpg`;
            photosJson[key].push(name);
            queue.push({ blob: p.blob, name, pathParts, thumb: p.thumb });
          });
        };
        if (canPhoto) {
          checklist.categories.forEach(c => c.items.forEach(it => {
            const s = scores[it.id] || {};
            if ((s.score != null ? s.score : it.max) < it.max) addPhotos([monthFolder, it.name, '缺失'], s.photos);
          }));
          checklist.keyObservations.forEach(k => addPhotos([monthFolder, k.name], keyObs[k.id]));
          if (noDeductDefect) PERFECT_ZONES.forEach(z => addPhotos([monthFolder, '滿分照片', z], perfectPhotos[z]));
        }
        addPhotos([monthFolder, 'SQC點檢表完成照片'], paperForm);

        const record = {
          id: recId, month: workMonth, time: basic.time.replace('T', ' '),
          dept: basic.dept, section: basic.section, empId: basic.staffId, staffName: staff ? staff.name : user,
          storeCode, storeName, storeType: canPhoto ? '可拍照' : '不可拍照',
          total, grade: grade.txt, staffCount: sign.count, identity: sign.identity,
          note: noPhotoReasonText, // 備註：不可拍照原因
          detail, observation, photos: photosJson, paperPhotos: (photosJson[[monthFolder, 'SQC點檢表完成照片'].join('/')] || []),
        };

        if (!CONFIGURED) {
          setRecords([{ id: recId, date: basic.time.slice(0, 10), store: storeName, section: basic.section, staff: staff?.name || user, version: checklist.version, total, grade: grade.txt }, ...records]);
          alert(`✅ 已送出（DEMO 模擬）\n店鋪：${storeName}\n合計得分：${total}/${TOTAL_MAX}（${grade.txt}）\n照片 ${queue.length} 張（正式模式將壓縮後背景直傳 Drive）`);
          resetWork(); setTab('records'); return;
        }

        // 正式模式：先背景排入照片（邊送邊傳），再寫入紀錄（秒回）
        queue.forEach(q => SqcUploader.enqueue({ ...q, recordId: recId }));
        SqcApi.submitRecord(record).then(() => {
          alert(`✅ 已送出\n店鋪：${storeName}　得分：${total}/${TOTAL_MAX}（${grade.txt}）\n照片 ${queue.length} 張背景上傳中，可離開此頁`);
          resetWork(); setTab('records'); loadRecords();
        }).catch(e => alert('送出失敗：' + e.message + '\n（照片仍會背景續傳，可稍後重試送出）'));
      };

      // ---- 查詢/彙總篩選 ----
      const [filter, setFilter] = useState({ from: '', to: '', section: '' });
      const filtered = records.filter(r => (!filter.from || r.date >= filter.from) && (!filter.to || r.date <= filter.to) && (!filter.section || r.section === filter.section));
      // 正式模式：進查詢/彙總頁或改條件時，重新向後端查當月
      useEffect(() => { if (CONFIGURED && (tab === 'records' || tab === 'summary')) loadRecords(); }, [tab, filter.from, filter.to, filter.section]);
      const delRecord = (id) => {
        if (!confirm('確定刪除此筆評核紀錄？')) return;
        if (!CONFIGURED) { setRecords(records.filter(r => r.id !== id)); return; }
        SqcApi.deleteRecord(workMonth, id).then(() => loadRecords()).catch(e => alert('刪除失敗：' + e.message));
      };

      const exportExcel = () => {
        const head = ['日期', '店鋪', '課別', '稽核員', '版本', '得分', '結果'];
        const data = [head].concat(filtered.map(r => [r.date, r.store, r.section, r.staff, r.version, r.total, r.grade]));
        const ws = XLSX.utils.aoa_to_sheet(data);
        ws['!cols'] = [{ wch: 12 }, { wch: 18 }, { wch: 10 }, { wch: 10 }, { wch: 8 }, { wch: 8 }, { wch: 8 }];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '彙總');
        XLSX.writeFile(wb, `SQC彙總_${filter.from || '全部'}_${filter.to || ''}.xlsx`);
      };

      // 匯出「當月名單中尚未點檢」的店鋪（本月已點檢者排除；可依課別）
      const exportUninspected = async () => {
        let done = new Set();
        if (CONFIGURED) {
          const q = await SqcApi.queryRecords(workMonth, { section: filter.section });
          (q.records || []).forEach(r => done.add(String(r.storeCode || '')));
        } else {
          records.forEach(r => done.add(String(r.store)));
        }
        const roster = STORE_ROSTER.filter(s => !filter.section || s.section === filter.section);
        const pending = roster.filter(s => !done.has(String(s.code)) && !done.has(String(s.name)));
        if (!pending.length) { alert('當月名單中沒有尚未點檢的店鋪 🎉'); return; }
        const head = ['店號', '店名', '課別', '店鋪型態'];
        const data = [head].concat(pending.map(s => [s.code, s.name, s.section, s.type || '一般店']));
        const ws = XLSX.utils.aoa_to_sheet(data);
        ws['!cols'] = [{ wch: 12 }, { wch: 18 }, { wch: 10 }, { wch: 10 }];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '尚未點檢');
        XLSX.writeFile(wb, `SQC尚未點檢_${workMonth}${filter.section ? '_' + filter.section : ''}.xlsx`);
      };

      const allSections = DEPTS.flatMap(d => d.sections);

      // ============================================================
      const TABS = [['basic', '📋 基本資料'], ['work', '📝 點檢作業'], ['records', '🔍 查詢紀錄'], ['summary', '📊 彙總專區']]
        .concat(isManager ? [['maintain', '⚙️ 維護專區']] : []);

      return (
        <div className="min-h-screen pb-32">
          <div className="sticky top-0 z-30 bg-emerald-700 text-white px-4 py-3 flex items-center justify-between shadow">
            <div className="flex items-center gap-2"><span className="font-bold">SQC 評核系統</span><span className="text-xs opacity-75">v115.6</span></div>
            <div className="flex items-center gap-3 text-sm"><span className="opacity-90">{user}</span><button onClick={logout} className="px-3 py-1 bg-white/20 rounded hover:bg-white/30">登出</button></div>
          </div>

          {/* Tabs */}
          <div className="bg-white border-b sticky top-[48px] z-20 overflow-x-auto">
            <div className="flex max-w-4xl mx-auto px-2">
              {TABS.map(([k, label]) => (
                <button key={k} onClick={() => setTab(k)} className={"px-4 py-3 text-sm font-medium whitespace-nowrap border-b-2 transition " + (tab === k ? "border-emerald-600 text-emerald-700" : "border-transparent text-slate-500")}>{label}</button>
              ))}
            </div>
          </div>

          <div className="max-w-4xl mx-auto p-4 space-y-4">
            {bootErr && <div className="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-3 py-2 flex justify-between items-center"><span>載入當月資料失敗：{bootErr}（可能連線逾時，請重新登入或稍後再試）</span><button onClick={() => setBootErr('')} className="text-red-400">✕</button></div>}
            {/* ========== 基本資料 ========== */}
            {tab === 'basic' && (
              <div className="bg-white rounded-xl shadow-sm p-5 space-y-4">
                <h2 className="font-bold text-slate-700">📋 基本資料</h2>
                <div className="grid md:grid-cols-2 gap-4 text-sm">
                  <div><label className="block text-xs text-slate-500 mb-1">點檢時間</label>
                    <input type="datetime-local" value={basic.time} onChange={e => setBasic({ ...basic, time: e.target.value })} className="w-full px-3 py-2 border border-slate-300 rounded-lg" /></div>
                  <div><label className="block text-xs text-slate-500 mb-1">部別</label>
                    <select value={basic.dept} onChange={e => setBasic({ ...basic, dept: e.target.value, section: '' })} className="w-full px-3 py-2 border border-slate-300 rounded-lg">
                      <option value="">— 請選擇 —</option>{DEPTS.map(d => <option key={d.dept}>{d.dept}</option>)}</select></div>
                  <div><label className="block text-xs text-slate-500 mb-1">課別</label>
                    <select value={basic.section} onChange={e => setBasic({ ...basic, section: e.target.value, storeCode: '', staffId: '' })} className="w-full px-3 py-2 border border-slate-300 rounded-lg">
                      <option value="">— 請選擇 —</option>{(DEPTS.find(d => d.dept === basic.dept)?.sections || allSections).map(s => <option key={s}>{s}</option>)}</select></div>
                  <div><label className="block text-xs text-slate-500 mb-1">點檢人員<span className="text-slate-400">（依課別帶出）</span></label>
                    <select value={basic.staffId} onChange={e => { const st = STAFFS.find(x => x.id === e.target.value); setBasic({ ...basic, staffId: e.target.value, dept: st?.dept || basic.dept, section: st?.section || basic.section }); }} className="w-full px-3 py-2 border border-slate-300 rounded-lg">
                      <option value="">— 請選擇 —</option>{STAFFS.filter(s => !basic.section || s.section === basic.section).map(s => <option key={s.id} value={s.id}>{s.name}</option>)}</select></div>
                </div>

                <div>
                  <label className="block text-xs text-slate-500 mb-1">點檢店鋪名單<span className="text-slate-400">（依課別自動帶出，亦可自行新增）</span></label>
                  <select value={basic.storeCode} onChange={e => setBasic({ ...basic, storeCode: e.target.value, customStore: '', customInfo: null })} className="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
                    <option value="">— 請選擇店鋪 —</option>
                    {sectionStores.map(s => <option key={s.code} value={s.code}>{s.code} {s.name}{s.type ? '（' + s.type + '）' : ''}</option>)}
                    <option value="__custom">＋ 自行新增店鋪…</option>
                  </select>
                  {basic.storeCode === '__custom' && (
                    <div className="mt-2">
                      <div className="flex gap-2">
                        <input value={basic.customStore} onChange={e => setBasic({ ...basic, customStore: e.target.value, customInfo: null })}
                          onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); doLookup(); } }}
                          placeholder="輸入店號 或 店名 → 查主檔" className="flex-1 px-3 py-2 border border-slate-300 rounded-lg text-sm" />
                        <button type="button" onClick={doLookup} className="px-3 py-2 bg-slate-700 text-white rounded-lg text-sm whitespace-nowrap">🔍 查主檔</button>
                      </div>
                      {basic.customInfo && <div className="text-xs text-emerald-600 mt-1">✓ 已選：{basic.customInfo.code} {basic.customInfo.name}<span className="text-slate-400">（營業課：{basic.customInfo.section}；本筆盤點課別＝上方選的課別）</span></div>}
                      {!basic.customInfo && custResults.length > 0 && (
                        <div className="mt-1 border border-slate-200 rounded-lg divide-y max-h-48 overflow-y-auto">
                          {custResults.map(s => (
                            <button type="button" key={s.code} onClick={() => { setBasic({ ...basic, customInfo: s, customStore: s.code + ' ' + s.name }); setCustResults([]); }}
                              className="w-full text-left px-3 py-2 text-sm hover:bg-emerald-50">{s.code} {s.name} <span className="text-slate-400">（營業課：{s.section}）</span></button>
                          ))}
                        </div>
                      )}
                      {!basic.customInfo && custResults.length === 0 && basic.customStore && <div className="text-xs text-slate-400 mt-1">按「查主檔」搜尋；主檔有才可新增</div>}
                    </div>
                  )}
                </div>

                <div>
                  <label className="block text-xs text-slate-500 mb-1">可否拍照<span className="text-red-500">（必選）</span><span className="text-slate-400"> — 決定是否需上傳缺失照片</span></label>
                  <div className="flex gap-2">
                    <button type="button" onClick={() => setBasic({ ...basic, storeType: 'photo', noPhotoReason: '', noPhotoOther: '' })} className={"flex-1 py-2.5 rounded-lg border font-medium " + (basic.storeType === 'photo' ? "bg-emerald-600 text-white border-emerald-600" : "bg-white text-slate-600 border-slate-300")}>📷 可拍照店鋪</button>
                    <button type="button" onClick={() => setBasic({ ...basic, storeType: 'nophoto' })} className={"flex-1 py-2.5 rounded-lg border font-medium " + (basic.storeType === 'nophoto' ? "bg-amber-500 text-white border-amber-500" : "bg-white text-slate-600 border-slate-300")}>🚫 不可拍照店鋪</button>
                  </div>
                  {basic.storeType === 'nophoto' && (
                    <div className="mt-2 bg-amber-50 border border-amber-200 rounded-lg p-3">
                      <div className="text-xs text-amber-700 mb-1.5">不可拍照原因<span className="text-red-500">（必選）</span></div>
                      <div className="flex flex-wrap gap-2">
                        {['廠區店', '營區店', '其他'].map(r => (

                  <div className="bg-white rounded-xl shadow-sm p-4 text-center"><div className="text-xs text-slate-500">平均得分</div><div className="text-3xl font-extrabold text-slate-700">{filtered.length ? Math.round(filtered.reduce((s, r) => s + r.total, 0) / filtered.length) : '—'}</div></div>

                    <tbody>{filtered.map(r => <tr key={r.id} className="border-b border-slate-100"><td className="py-2 px-3 text-slate-500">{r.date}</td><td className="font-medium text-slate-800">{r.store}</td><td className="text-slate-500">{r.section}</td><td className="text-slate-500">{r.staff}</td><td className="font-bold">{r.total}</td><td><span className={"text-xs px-2 py-0.5 rounded " + gradeOf(r.total).bg}>{r.grade}</span></td></tr>)}</tbody>

            {/* ========== 維護專區 ========== */}

    }

    // ============================================================
    // 維護專區
    // ============================================================
    // 官方評核表(原始表單版面) → 結構化題庫列。非官方表回傳 null。
    function officialFormToRows(aoa) {
      if (!aoa || aoa.length < 2) return null;
      const head = (aoa[0] || []).map(x => String(x || ''));
      const isForm = head.some(h => h.indexOf('評核內容與規範') >= 0) && head.some(h => h.indexOf('分數') >= 0);
      if (!isForm) return null;
      const clean = s => String(s == null ? '' : s).replace(/[\r\n]+/g, '').trim();
      const halves = [{ c: 0, n: 1, s: 2, sc: 6 }, { c: 8, n: 9, s: 10, sc: 14 }];
      const items = [];
      halves.forEach(h => {
        let curCat = '', last = null;
        for (let i = 1; i < aoa.length; i++) {
          const row = aoa[i] || [];
          const catRaw = clean(row[h.c]);
          if (catRaw) curCat = catRaw.replace(/共\s*\d+\s*分$/, '');
          const name = clean(row[h.n]);
          const rawScore = row[h.sc];
          const spec = String(row[h.s] == null ? '' : row[h.s]).replace(/\r/g, '');
          const isObs = String(rawScore).indexOf('--') >= 0;
          if (name) {
            if (isObs) { last = null; continue; } // 觀察題略過（另於觀察區維護）
            const num = (name.match(/^(\d+)/) || [])[1] || '';
            const m = spec.match(/每項\s*(\d+)\s*分/);
            let method = '合格0分', per = '', subs = '';
            if (m) {
              method = '分區扣分'; per = m[1];
              const lines = spec.split('\n');
              const startIdx = lines.findIndex(l => l.indexOf('/') >= 0);
              if (startIdx >= 0) {
                let listStr = lines.slice(startIdx).join('').replace(/[（(]每項[\s\S]*$/, ''); // 合併換行的清單、去掉(每項…)註記
                let parts = listStr.split('/').map(x => x.replace(/_+/g, '').trim()).filter(Boolean);
                parts = parts.map(p => p === '其他貨架' ? '其他貨架:填寫' : p);
                subs = parts.join('|');
              }
            }
            const score = (typeof rawScore === 'number') ? rawScore : (parseFloat(rawScore) || 0);
            const letter = curCat.indexOf('商品') >= 0 ? 'B' : (curCat.indexOf('客用') >= 0 ? 'C' : 'A');
            last = { 排序: items.length + 1, 編號: letter + num, 大分類: curCat, 題號名稱: name, 配分: score, 計分方式: method, 每項扣分: per, 子項清單: subs, 規範說明: spec.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim() };
            items.push(last);
          } else if (last && rawScore !== '' && !isObs) {
            const add = (typeof rawScore === 'number') ? rawScore : (parseFloat(rawScore) || 0);
            if (add) last.配分 = Number(last.配分) + add; // 子列加總（落地/休憩）
          }
        }
      });
      if (!items.length) return null;
      items.sort((a, b) => (parseInt(a.題號名稱) || 0) - (parseInt(b.題號名稱) || 0));
      items.forEach((it, i) => it.排序 = i + 1);
      return items;
    }

    // 官方委外名單(多分頁) → 標準店鋪名單列。找含「店號＋主責課」的分頁；非此格式回 null。
    function rosterToRows(sheets) {
      if (!sheets || !sheets.length) return null;
      const clean = s => String(s == null ? '' : s).replace(/[\r\n\s]/g, '').trim();
      for (const sh of sheets) {
        const head = (sh.aoa[0] || []).map(clean);
        const ci = { code: head.indexOf('店號'), name: head.indexOf('店名'), sect: head.findIndex(h => h.indexOf('主責課') >= 0), follow: head.indexOf('隨盤點') };
        if (ci.code < 0 || ci.sect < 0) continue; // 不是名單資料頁
        const rows = [];
        for (let i = 1; i < sh.aoa.length; i++) {
          const r = sh.aoa[i] || [];
          const code = String(r[ci.code] == null ? '' : r[ci.code]).trim();
          if (!code) continue;
          const follow = ci.follow >= 0 ? String(r[ci.follow] == null ? '' : r[ci.follow]).trim() : '';
          rows.push({ 店號: code, 店名: String(r[ci.name] || '').trim(), 課別: String(r[ci.sect] || '').trim(), 店鋪型態: follow ? '隨盤點點檢店' : '一般店' });
        }
        if (rows.length) return rows;
      }
      return null;
    }

    // 各資料區欄位定義（key＝主鍵中文欄名；fields＝表單欄位；cols＝列表顯示欄）
    const MAINT_AREAS = [
      { kind: 'items', importKind: 'checklist', label: '點檢題目', monthly: true, key: '編號',
        note: '分月轉入；子項清單用 | 分隔，可填寫用 :填寫、多單位用 :2（如 OC|WI|其他貨架:填寫）',
        cols: ['編號', '大分類', '題號名稱', '配分', '計分方式'],
        fields: [{ k: '排序', t: 'number' }, { k: '編號', t: 'text' }, { k: '大分類', t: 'text' }, { k: '題號名稱', t: 'text' }, { k: '配分', t: 'number' }, { k: '計分方式', t: 'select', opts: ['合格0分', '分區扣分'] }, { k: '每項扣分', t: 'number' }, { k: '子項清單', t: 'text', ph: 'OC|WI|其他貨架:填寫' }, { k: '規範說明', t: 'text' }] },
      { kind: 'obs', importKind: 'obs', label: '觀察區題目', monthly: true, key: '編號',
        note: '三型：拍照題／有無題／符合題。顯示條件：always＝一律顯示、has＝前面「有無題」選「有」才顯示、hasOrClosed＝選「有或廁所封閉」才顯示',
        cols: ['編號', '類型', '題目名稱', '選項'],
        fields: [{ k: '排序', t: 'number' }, { k: '編號', t: 'text' }, { k: '類型', t: 'select', opts: ['拍照', '有無', '符合'] }, { k: '題目名稱', t: 'text' }, { k: '選項', t: 'text', ph: '有|無|廁所封閉' }, { k: '顯示條件', t: 'select', opts: ['always', 'has', 'hasOrClosed'] }, { k: '必填', t: 'select', opts: ['否', '是'] }] },
      { kind: 'roster', importKind: 'roster', label: '店鋪名單', monthly: true, key: '店號',
        note: '分月轉入；課別＝盤點主責課；可直接匯入官方委外名單(自動轉)。店號請設文字格式避免掉 0',
        cols: ['店號', '店名', '課別', '店鋪型態'],
        fields: [{ k: '店號', t: 'text' }, { k: '店名', t: 'text' }, { k: '課別', t: 'text' }, { k: '店鋪型態', t: 'select', opts: ['一般店', '隨盤點點檢店'] }] },
      { kind: 'stores', importKind: 'stores', label: '店鋪主檔', monthly: false, key: '店號',
        note: '全門市主檔（常駐；可直接匯入官方「店庫」總表，店號請設文字格式）',
        cols: ['店號', '店名', '營業課名稱', '縣市', '鄉鎮'],
        fields: [{ k: '序號', t: 'text' }, { k: '店號', t: 'text' }, { k: '店名', t: 'text' }, { k: '營業本部名稱', t: 'text' }, { k: '營業部名稱', t: 'text' }, { k: '營業課名稱', t: 'text' }, { k: '營業擔當', t: 'text' }, { k: '縣市', t: 'text' }, { k: '鄉鎮', t: 'text' }, { k: '地址', t: 'text' }] },
      { kind: 'staffs', importKind: 'staff', label: '點檢人員', monthly: false, key: '工號',
        note: '常駐；管理者需填 AD帳號 與 角色=管理者。基本資料的點檢人員下拉只帶「有填部別或課別」的人',
        cols: ['姓名', '部別', '課別', '職稱', '角色'],
        fields: [{ k: '部別', t: 'text' }, { k: '課別', t: 'text' }, { k: '工號', t: 'text' }, { k: '姓名', t: 'text' }, { k: '職稱', t: 'text' }, { k: 'AD帳號', t: 'text' }, { k: '角色', t: 'select', opts: ['點檢員', '管理者'] }] },
    ];

    function MaintainPanel({ configured, curMonth, onReload }) {
      const [sub, setSub] = useState('items');
      const [month, setMonth] = useState(curMonth);
      const [rows, setRows] = useState([]);
      const [editing, setEditing] = useState(null);
      const [uploaded, setUploaded] = useState({});
      const [logRows, setLogRows] = useState([]);
      const isLog = sub === 'log';
      const area = MAINT_AREAS.find(a => a.kind === sub);

      const load = () => {
        if (!configured) { setRows([]); setLogRows([]); return; }
        if (isLog) { SqcApi.getChangeLog(300).then(r => setLogRows(r.rows || [])).catch(() => setLogRows([])); return; }
        SqcApi.getMaster(area.importKind, month).then(r => setRows(r.rows || [])).catch(() => setRows([]));
      };
      useEffect(() => { setEditing(null); load(); }, [sub, month]);

      const parseFile = (file) => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const wb = XLSX.read(ev.target.result, { type: 'array' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            resolve({
              json: XLSX.utils.sheet_to_json(ws, { defval: '' }),
              aoa: XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' }),
              sheets: wb.SheetNames.map(n => ({ name: n, aoa: XLSX.utils.sheet_to_json(wb.Sheets[n], { header: 1, defval: '' }) })),
            });
          } catch (err) { reject(err); }
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
      });

      const onUpload = async (e) => {
        const f = e.target.files[0]; e.target.value = ''; if (!f) return;
        if (!configured) { alert('DEMO 模式：設定 GAS 後才會實際寫入試算表'); return; }
        try {
          const parsed = await parseFile(f);
          let data = parsed.json, convMsg = '';
          // 點檢題目：官方評核表版面自動轉題庫
          if (sub === 'items') {
            const c = officialFormToRows(parsed.aoa);
            if (c) { data = c; convMsg = '\n（偵測到官方評核表，已自動轉題庫；13題機台等客製子項請單筆補上）'; }
          }
          // 店鋪名單：官方委外名單(多分頁)自動轉（主責課→課別、隨盤點→店鋪型態）
          if (sub === 'roster') {
            const c = rosterToRows(parsed.sheets);
            if (c) { data = c; convMsg = '\n（偵測到官方委外名單，已自動轉：主責課→課別、隨盤點→店鋪型態）'; }
          }
          const r = await SqcApi.importMaster(area.importKind, month, data, f.name);
          setUploaded({ ...uploaded, [sub]: f.name });
          load(); await onReload();
          alert(`✅ 已匯入「${f.name}」${r.count} 筆（同名覆蓋，以最新為主）` + convMsg);
        } catch (err) { alert('匯入失敗：' + err.message); }
      };

      const blank = () => { const o = {}; area.fields.forEach(f => o[f.k] = (f.k === '排序') ? (rows.length + 1) : (f.t === 'select' ? f.opts[0] : '')); return o; };
      const save = async () => {
        if (!String(editing[area.key])) { alert(`「${area.key}」必填`); return; }
        if (!configured) { alert('DEMO 模式不寫回；設定 GAS 後可存回試算表'); setEditing(null); return; }
        try { await SqcApi.upsertRow(area.importKind, month, editing); setEditing(null); load(); await onReload(); alert('✅ 已儲存'); }
        catch (e) { alert('儲存失敗：' + e.message); }
      };
      const remove = async (id) => {
        if (!confirm('確定刪除此筆？')) return;
        if (!configured) { alert('DEMO 模式不寫回'); return; }
        try { await SqcApi.deleteRow(area.importKind, month, id); load(); await onReload(); } catch (e) { alert('刪除失敗：' + e.message); }
      };

      const isEdit = !isLog && editing && rows.some(r => String(r[area.key]) === String(editing[area.key]) && String(editing[area.key]) !== '');

      return (
        <div className="space-y-4">
          <div className="bg-white rounded-xl shadow-sm p-2 flex flex-wrap gap-1">
            {MAINT_AREAS.map(a => <button key={a.kind} onClick={() => setSub(a.kind)} className={"px-3 py-1.5 text-sm rounded-lg " + (sub === a.kind ? "bg-emerald-600 text-white" : "text-slate-600 hover:bg-slate-100")}>{a.label}{a.monthly ? '（分月）' : ''}</button>)}
            <button onClick={() => setSub('log')} className={"px-3 py-1.5 text-sm rounded-lg " + (isLog ? "bg-emerald-600 text-white" : "text-slate-600 hover:bg-slate-100")}>📜 異動紀錄</button>
          </div>

          {isLog && (
            <div className="bg-white rounded-xl shadow-sm p-5">
              <div className="flex items-center justify-between mb-3">
                <h3 className="font-bold text-slate-700">📜 異動紀錄</h3>
                <button onClick={load} className="text-sm px-3 py-1.5 bg-slate-100 rounded-lg hover:bg-slate-200">重新整理</button>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead><tr className="text-left text-slate-500 border-b bg-slate-50"><th className="py-2 px-2">時間</th><th className="px-2">操作人</th><th className="px-2">動作</th><th className="px-2">對象</th><th className="px-2">說明</th></tr></thead>
                  <tbody>
                    {logRows.map((r, i) => (
                      <tr key={i} className="border-b border-slate-100">
                        <td className="py-2 px-2 text-slate-500 whitespace-nowrap">{r.time}</td><td className="px-2">{r.user}</td><td className="px-2">{r.action}</td><td className="px-2 text-slate-600">{r.target}</td><td className="px-2 text-slate-500">{r.note}</td>
                      </tr>
                    ))}
                    {logRows.length === 0 && <tr><td colSpan="5" className="py-6 text-center text-slate-400">{configured ? '尚無異動紀錄' : 'DEMO 模式不載入'}</td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {!isLog && (
          <div className="bg-white rounded-xl shadow-sm p-5">
            <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
              <div>
                <h3 className="font-bold text-slate-700">{area.label}</h3>
                <p className="text-xs text-slate-400">{area.note}　·　同檔名再次匯入將以最新覆蓋</p>
              </div>
              <div className="flex items-center gap-2">
                {area.monthly && <select value={month} onChange={e => setMonth(e.target.value)} className="px-3 py-1.5 border border-slate-300 rounded-lg text-sm"><option value="11506">115年06月</option><option value="11507">115年07月</option></select>}
                <button onClick={() => setEditing(blank())} className="text-sm px-3 py-1.5 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700">+ 新增</button>
                <label className="text-sm px-3 py-1.5 bg-slate-700 text-white rounded-lg cursor-pointer hover:bg-slate-800">📥 {uploaded[sub] ? '重新匯入' : 'Excel 匯入'}<input type="file" accept=".xlsx,.xls" className="hidden" onChange={onUpload} /></label>
              </div>
            </div>
            {uploaded[sub] && <div className="text-xs text-emerald-600 mb-3">✓ 最近匯入：{uploaded[sub]}</div>}

            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead><tr className="text-left text-slate-500 border-b bg-slate-50">{area.cols.map(c => <th key={c} className="py-2 px-2">{c}</th>)}<th className="px-2">操作</th></tr></thead>
                <tbody>
                  {rows.slice(0, 500).map((r, i) => (
                    <tr key={i} className="border-b border-slate-100">
                      {area.cols.map(c => <td key={c} className="py-2 px-2 text-slate-700">{String(r[c] != null ? r[c] : '')}</td>)}
                      <td className="px-2 whitespace-nowrap"><button onClick={() => setEditing({ ...r })} className="text-xs text-blue-600 mr-2">編輯</button><button onClick={() => remove(r[area.key])} className="text-xs text-red-600">刪除</button></td>
                    </tr>
                  ))}
                  {rows.length > 500 && <tr><td colSpan={area.cols.length + 1} className="py-2 px-2 text-center text-slate-400 text-xs">僅顯示前 500 筆（共 {rows.length} 筆）；請用匯入或搜尋維護</td></tr>}
                  {rows.length === 0 && <tr><td colSpan={area.cols.length + 1} className="py-6 text-center text-slate-400">{configured ? '尚無資料，請匯入或新增' : 'DEMO 模式不載入（請部署 GAS 後於正式環境維護）'}</td></tr>}
                </tbody>
              </table>
            </div>

            {editing && (
              <div className="mt-4 border-t pt-4">
                <h4 className="font-bold text-slate-700 mb-2">{isEdit ? '編輯' : '新增'}{area.label}</h4>
                <div className="grid md:grid-cols-2 gap-2 text-sm">
                  {area.fields.map(f => (
                    <label key={f.k} className={"block " + (f.k === '子項清單' || f.k === '規範說明' || f.k === '題目名稱' ? 'md:col-span-2' : '')}>
                      <span className="text-xs text-slate-500">{f.k}</span>
                      {f.t === 'select'
                        ? <select value={editing[f.k]} onChange={e => setEditing({ ...editing, [f.k]: e.target.value })} className="w-full px-2 py-1.5 border border-slate-300 rounded">{f.opts.map(o => <option key={o} value={o}>{o}</option>)}</select>
                        : <input type={f.t} value={editing[f.k]} placeholder={f.ph || ''} onChange={e => setEditing({ ...editing, [f.k]: e.target.value })} className="w-full px-2 py-1.5 border border-slate-300 rounded" />}
                    </label>
                  ))}
                </div>
                <div className="flex gap-2 mt-3">
                  <button onClick={save} className="px-4 py-1.5 bg-emerald-600 text-white rounded-lg text-sm hover:bg-emerald-700">儲存</button>
                  <button onClick={() => setEditing(null)} className="px-4 py-1.5 bg-slate-200 text-slate-600 rounded-lg text-sm">取消</button>
                </div>
              </div>
            )}
          </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script>
    // 以 classic runtime 編譯（避免新版 Babel 預設 automatic runtime 產生 import 而在純瀏覽器報錯）
    (function () {
      try {
        var src = document.getElementById('appCode').textContent;
        var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
        (0, eval)(out);
      } catch (e) {
        document.getElementById('root').innerHTML =
          '<pre style="color:#b91c1c;padding:16px;white-space:pre-wrap">啟動錯誤：' + (e && e.message ? e.message : e) + '</pre>';
        console.error(e);
      }
    })();
  </script>
</body>
</html>
